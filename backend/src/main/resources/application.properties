spring.main.allow-circular-references=true

# H2 file-based database (data persists across restarts)
spring.datasource.url=jdbc:h2:file:./data/expensetracker;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwtSecret= ======================expense=tracker=mywallet===========================
app.jwtExpirationMs=86400000

# Email disabled - using console logging instead
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@example.com
spring.mail.password=dummy
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

app.verificationCodeExpirationMs=600000

app.user.profile.upload.dir=./uploads/user/profile
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
